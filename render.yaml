services:
  - type: web
    name: axyomis
    env: node
    region: oregon
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm run vercel-build
    startCommand: pnpm start
    rootDir: .
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: true
      - key: BASE_PATH
        value: "/"
