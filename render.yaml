services:
  - name: axyomis-api
    type: web
    env: node
    plan: free
    buildCommand: pnpm install && pnpm --filter=@workspace/api-server run build
    startCommand: pnpm --filter=@workspace/api-server run start
    envVars:
      - key: GROQ_API_KEY
        sync: false
      # YOUTUBE_API_KEY should be added in Render's environment variables section

  - name: axyomis-chatbot
    type: web
    plan: free
    env: client
    # Ensure esbuild is installed and then run the build command.
    buildCommand: pnpm install --filter=react-example && pnpm add -D esbuild && cd Axyomis-X && pnpm run build
    staticPublishPath: ./artifacts/axyomis/dist/public
    routes:
      - type: rewrite
        source: /api/(.*)
        destination: https://axyomis-api.onrender.com/api/$1
