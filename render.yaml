services:
  - name: axyomis-api
    type: web
    env: node
    plan: free
    buildCommand: |
      pnpm install --filter=@workspace/api-server
      pnpm --filter=@workspace/api-server run build
    startCommand: pnpm --filter=@workspace/api-server run start
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        value: YOUR_YOUTUBE_API_KEY
  - name: axyomis-chatbot
    type: web
    plan: free
    env: static
    buildCommand: | 
      pnpm install --filter=@workspace/axyomis
      pnpm --filter=@workspace/axyomis run build
    staticPublishPath: ./artifacts/axyomis/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://axyomis-api.onrender.com/api/*
