services:
  - type: web
    name: axyomis
    env: node
    region: oregon
    plan: free
    buildCommand: corepack enable && corepack prepare pnpm@9 --activate && pnpm install --frozen-lockfile --prod=false && pnpm --dir artifacts/axyomis exec vite build --config ../../vite.vercel.config.ts
    startCommand: pnpm exec serve -s artifacts/axyomis/dist/public -p ${PORT:-10000}
    rootDir: .
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: true
      - key: BASE_PATH
        value: "/"
