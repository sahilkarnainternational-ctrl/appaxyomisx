services:
  - type: web
    name: axyomis
    env: node
    region: oregon
    plan: free
    buildCommand: corepack enable && corepack prepare pnpm@9.15.9 --activate && pnpm install --frozen-lockfile --prod=false && pnpm run render-build
    startCommand: cd artifacts/axyomis && pnpm exec serve -s dist/public -l tcp://0.0.0.0:${PORT:-10000}
    rootDir: .
    envVars:
      - key: NODE_VERSION
        value: "22.13.0"
      - key: PNPM_VERSION
        value: "9"
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: true
      - key: BASE_PATH
        value: "/"
